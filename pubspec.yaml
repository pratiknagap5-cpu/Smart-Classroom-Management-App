name: smart_classroom
description: "Smart Classroom Management App - Manage students, attendance, and fees"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.1.2
  path_provider: ^2.1.5
  intl: ^0.20.2
  uuid: ^4.5.1
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0A73FF"
  image: "assets/icon.png"
  android_12:
    image: "assets/icon.png"
    color: "#0A73FF"

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/splash_logo.png